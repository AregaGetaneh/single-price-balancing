# Configuration for single-price balancing market analysis
# Accompanies: "Optimal bidding under single-price imbalance settlement
#               in electricity markets"

markets:
  nordic:
    name: "Nordic mFRR (DK2)"
    product: "mFRR"
    bidding_zone: "DK2"
    platform: "MARI"
    start_date: "2022-01-01"
    end_date: "2024-03-01"
    data_source: "Energi Data Service"
  german:
    name: "German aFRR (DE-LU)"
    product: "aFRR"
    bidding_zone: "DE-LU"
    platform: "PICASSO"
    start_date: "2022-01-01"
    end_date: "2024-03-01"
    data_source: "ENTSO-E Transparency Platform"

backtesting:
  train_test_split: 0.70          # 70/30 chronological split
  rolling_window_hours: 4320      # 180 days
  step_hours: 168                 # re-estimate weekly

bootstrap:
  n_replicates: 500               # B = 500
  block_length_hours: 168         # 1-week contiguous blocks
  confidence_level: 0.95
  seed: 42

dro:
  epsilon_grid: [0.0, 0.25, 0.5, 1.0, 2.0]
  tau: 2.0                        # smoothing temperature
  norm: "l2"

visualization:
  dpi: 300
  save_pdf: true
  figsize_single: [6.5, 4.0]
  figsize_double: [13.0, 5.0]
  font_size: 10

output:
  results_dir: "results"
  figures_dir: "results/figures"
  tables_dir: "results/tables"
  data_dir: "data"
